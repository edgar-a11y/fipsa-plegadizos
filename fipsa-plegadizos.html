const PARAMS = {
  merma: 7,

    largoLam,
    anchoLam,

    m2total,
    m2merma,
    costoLamTotal,

    costoProduccionTotal,
    costoProduccionPieza,

    grabSeparado,
    grabPieza,
    subtotalPieza,
    subtotalTotal,
    precioSugPieza,
    precioSugTotal,
    utilBruta,
    isr,
    segSoc,
    utilNeta,
    margenNeto,
    pasadas,
    cant

}

async function uploadPrintCard(file, path) {
  const token = window._supabaseSession?.access_token;
  if (!token) throw new Error('Sin sesión activa');
  const SUPA = 'https://nrrtkweaatfgdvurkjgi.supabase.co';
  const BUCKET = 'fipsa-archivos';
  // Upload (upsert)
  const res = await fetch(`${SUPA}/storage/v1/object/${BUCKET}/${path}`, {
    method: 'POST',
    headers: {
      'apikey': 'sb_publishable_FcYxw7ycNFaJXP4VF6qlmw_oBIzGXzQ',
      'Authorization': `Bearer ${token}`,
      'Content-Type': file.type || 'application/pdf',
      'x-upsert': 'true'
    },
    body: file
  });
  if (!res.ok) {
    const e = await res.json();
    throw new Error(e.error || 'Error al subir archivo');
  }
  // Public URL
  return `${SUPA}/storage/v1/object/public/${BUCKET}/${path}`;
}
